<!DOCTYPE html>
<html>
<head>
  <title>TaskBuddy SA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="font-family: Arial; padding: 20px;">

  <h1>TaskBuddy SA</h1>
  <p>Connect with trusted local helpers or earn money doing tasks.</p>

  <hr>

  <h2>Post a Task</h2>
  <form>
    <input placeholder="Your Name" required><br><br>
    <input placeholder="Task Description" required><br><br>
    <input placeholder="Location" required><br><br>
    <button type="submit">Submit Task</button>
  </form>

  <hr>

  <h2>Register as Worker</h2>
  <form>
    <input placeholder="Full Name" required><br><br>
    <input placeholder="Skills (e.g. cleaning, plumbing)" required><br><br>
    <input placeholder="Phone Number" required><br><br>
    <button type="submit">Register</button>
  </form>

</body>
      </html>
